<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Hitotsu | Digital Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0e0e0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: #161616;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    /* Terminal header bar */
    .terminal-bar {
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot.red    { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #27c93f; }

    .terminal-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: #555;
      margin-left: 0.5rem;
      letter-spacing: 0.05em;
    }

    .card-header {
      padding: 2.2rem 2rem 1.8rem;
      border-bottom: 1px solid #222;
    }

    .prompt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #D97757;
      margin-bottom: 0.6rem;
      opacity: 0.8;
    }

    .card-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.2rem;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.8rem;
    }

    .card-name span { color: #D97757; }

    .card-tag {
      display: inline-block;
      background: rgba(217, 119, 87, 0.12);
      border: 1px solid rgba(217, 119, 87, 0.3);
      color: #D97757;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      padding: 0.25rem 0.7rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .card-body {
      padding: 1.8rem 2rem;
    }

    .code-comment {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: #4a4a4a;
      margin-bottom: 1.4rem;
      line-height: 1.8;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      background: #1e1e1e;
      border: 1px solid #262626;
      text-decoration: none;
      transition: all 0.2s;
    }

    .link-item:hover {
      border-color: #D97757;
      background: rgba(217, 119, 87, 0.06);
    }

    .link-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg { width: 18px; height: 18px; }

    .link-icon.web       { background: rgba(217,119,87,0.15); border: 1px solid rgba(217,119,87,0.3); }
    .link-icon.note      { background: rgba(65,201,180,0.15); border: 1px solid rgba(65,201,180,0.3); }
    .link-icon.instagram { background: rgba(220,39,67,0.12);  border: 1px solid rgba(220,39,67,0.25); }
    .link-icon.threads   { background: rgba(255,255,255,0.05); border: 1px solid #333; }

    .link-text { flex: 1; }

    .link-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: #444;
      letter-spacing: 0.1em;
    }

    .link-value {
      font-size: 0.84rem;
      font-weight: 400;
      color: #ccc;
    }

    .arrow {
      font-family: 'JetBrains Mono', monospace;
      color: #333;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    .link-item:hover .arrow { color: #D97757; }

    .qr-section {
      text-align: center;
      padding-top: 0.5rem;
      border-top: 1px solid #222;
      padding-top: 1.5rem;
    }

    .qr-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
    }

    .qr-wrap {
      display: inline-block;
      padding: 10px;
      background: #fff;
      border-radius: 10px;
    }

    .qr-wrap img {
      width: 100px;
      height: 100px;
      display: block;
    }

    .card-footer {
      background: #111;
      border-top: 1px solid #1e1e1e;
      padding: 0.9rem;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: #333;
      letter-spacing: 0.08em;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes typing {
      from { width: 0; }
      to   { width: 100%; }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
      50%       { box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 40px rgba(217,119,87,0.08); }
    }

    .card {
      animation: fadeUp 0.6s ease both, glowPulse 4s ease-in-out 1s infinite;
    }

    .terminal-bar { animation: fadeUp 0.5s ease 0.1s both; }
    .card-header  { animation: fadeUp 0.5s ease 0.3s both; }

    .prompt {
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      animation: typing 0.4s steps(8) 0.6s forwards;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #D97757;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }

    .card-name  { animation: fadeUp 0.5s ease 1.1s both; opacity: 0; }
    .card-tag   { animation: fadeUp 0.5s ease 1.3s both; opacity: 0; }
    .code-comment { animation: fadeUp 0.5s ease 1.5s both; opacity: 0; }

    .link-item:nth-child(1) { animation: fadeUp 0.4s ease 1.7s both; opacity: 0; }
    .link-item:nth-child(2) { animation: fadeUp 0.4s ease 1.85s both; opacity: 0; }
    .link-item:nth-child(3) { animation: fadeUp 0.4s ease 2.0s both; opacity: 0; }
    .link-item:nth-child(4) { animation: fadeUp 0.4s ease 2.15s both; opacity: 0; }

    .qr-section  { animation: fadeUp 0.5s ease 2.3s both; opacity: 0; }
    .card-footer { animation: fadeUp 0.5s ease 2.5s both; opacity: 0; }

    .link-item {
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
    }
    .link-item:hover {
      transform: translateX(5px);
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="terminal-bar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="terminal-title">hitotsu — claude code</span>
    </div>

    <div class="card-header">
      <div class="prompt">$ whoami<span class="cursor"></span></div>
      <div class="card-name">Hitot<span>su</span> Company</div>
      <div class="card-tag">AI社員の制作・導入</div>
    </div>

    <div class="card-body">
      <div class="code-comment">
        // あなたのビジネスに、<br>
        // AIで動く社員をつくります。
      </div>

      <div class="links">

        <a href="https://akooooola-max.github.io/hitotsu-company-hp/" target="_blank" class="link-item">
          <div class="link-icon web">
            <svg viewBox="0 0 24 24" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div class="link-text">
            <div class="link-label">WEBSITE</div>
            <div class="link-value">ai-company</div>
          </div>
          <span class="arrow">→</span>
        </a>

        <a href="https://note.com/hitotsu_ai" target="_blank" class="link-item">
          <div class="link-icon note">
            <svg viewBox="0 0 24 24" fill="#41C9B4">
              <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
          </div>
          <div class="link-text">
            <div class="link-label">NOTE</div>
            <div class="link-value">@hitotsu_ai</div>
          </div>
          <span class="arrow">→</span>
        </a>

        <a href="https://www.instagram.com/hitotsu_ai/?hl=ja" target="_blank" class="link-item">
          <div class="link-icon instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="#dc2743" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
            </svg>
          </div>
          <div class="link-text">
            <div class="link-label">INSTAGRAM</div>
            <div class="link-value">@hitotsu_ai</div>
          </div>
          <span class="arrow">→</span>
        </a>

        <a href="https://www.threads.com/@hitotsu_ai" target="_blank" class="link-item">
          <div class="link-icon threads">
            <svg viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>
            </svg>
          </div>
          <div class="link-text">
            <div class="link-label">THREADS</div>
            <div class="link-value">@hitotsu_ai</div>
          </div>
          <span class="arrow">→</span>
        </a>

      </div>

      <div class="qr-section">
        <div class="qr-label">SCAN TO VISIT</div>
        <div class="qr-wrap">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https://akooooola-max.github.io/hitotsu-company-hp/&color=D97757&bgcolor=FFFFFF" alt="QR Code">
        </div>
      </div>
    </div>

    <div class="card-footer">© 2026 Hitotsu Company</div>
  </div>

</body>
</html>
